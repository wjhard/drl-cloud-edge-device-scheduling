env:
  min_tasks: 8
  max_tasks: 25
  edge_density_min: 0.2
  edge_density_max: 0.5
  max_tasks_padding: 30
  resource_config_path: "configs/resource_default.yaml"
  reward_mode: "relative_heft"
  normalize_observations: true
  scheduler_mode: "ranked"
  include_upward_rank_feature: true

training:
  total_timesteps: 200000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  net_arch: [128, 128]
  seed: 123
  warm_start_bc: true
  bc_epochs: 80
  bc_learning_rate: 0.001
  bc_batch_size: 64
  bc_dataset_path: "training/bc_datasets/mlp_ranked_with_rank_bc_dataset_normalized.npz"
  target_kl: 0.03
  curriculum:
    enabled: true
    phases:
      - progress_end: 0.3
        min_tasks: 8
        max_tasks: 15
      - progress_end: 0.6
        min_tasks: 8
        max_tasks: 20
      - progress_end: 1.0
        min_tasks: 8
        max_tasks: 25
  save_path: "training/checkpoints/ppo_mlp_ranked_all_combined"
  tensorboard_log: "training/tb_logs"
  monitor_log_dir: "training/monitor_logs"

evaluation:
  num_validation_scenarios: 20
  validation_task_sizes: [10, 15, 20, 25]
  validation_seed_start: 1000000
  scenarios_dir: "evaluation/scenarios"
  results_path: "evaluation/results/summary_mlp_ranked_all_combined.json"
